<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration System - Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header with Date and Time -->
    <header class="header">
        <div class="header-container">
            <h1 class="header-title">Student Registration System</h1>
            <div class="date-time" id="dateTime"></div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="welcome-card">
            <!-- Progress Indicator -->
            <div class="progress-container">
                <div class="progress-step active">
                    <div class="step-number">1</div>
                    <div class="step-label">Welcome</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step">
                    <div class="step-number">2</div>
                    <div class="step-label">Student Info</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step">
                    <div class="step-number">3</div>
                    <div class="step-label">Academic</div>
                </div>
                <div class="progress-line"></div>
                <div class="progress-step">
                    <div class="step-number">4</div>
                    <div class="step-label">Summary</div>
                </div>
            </div>

            <!-- Welcome Content -->
            <div class="welcome-content">
                <div class="welcome-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <h2>Welcome to Registration</h2>
                <p>Start your registration journey today. Complete your student information in just a few simple steps.</p>
                <button class="btn btn-primary btn-large" onclick="startRegistration()">Start Registration</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Student Registration System. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Display current date and time
        function updateDateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            document.getElementById('dateTime').textContent = now.toLocaleDateString('en-US', options);
        }

        // Start registration
        function startRegistration() {
            window.location.href = 'student.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', updateDateTime);
        setInterval(updateDateTime, 1000);
    </script>
</body>
</html>
